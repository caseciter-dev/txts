name: Convert PDF to Text

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  # Optional: Runs automatically every day at midnight (UTC)
  schedule:
    - cron: '0 0 * * *'

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    
    # Grants the action permission to write/commit files back to your repo
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run PDF Converter Script
      run: python convert_pdf.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Check if the file actually changed to avoid empty commit errors
        if git status --porcelain | grep -q "latest_order.txt"; then
          git add latest_order.txt
          git commit -m "Automated update: Converted latest PDF to text"
          git push
        else
          echo "No changes detected in the text output."
        fi
